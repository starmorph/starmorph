name: GitHub Readme Blog Posts
on:
  schedule:
    # Runs once a week on Sundays at midnight UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate blog post list and update README
        run: |
          python3 << 'PYEOF'
          import re
          import xml.etree.ElementTree as ET
          from urllib.request import urlopen, Request

          FEED_URL = "https://blog.starmorph.com/feed.xml"
          MAX_POSTS = 5

          # Fetch and parse RSS feed
          req = Request(FEED_URL, headers={"User-Agent": "GitHub-Actions"})
          feed_xml = urlopen(req).read()
          root = ET.fromstring(feed_xml)
          items = root.findall(".//item")[:MAX_POSTS]

          posts = []
          for item in items:
              title = item.findtext("title", "")
              link = item.findtext("link", "")
              if title and link:
                  posts.append({"title": title, "link": link})

          # Build text list
          lines = []
          for p in posts:
              lines.append(f'- 📝 [{p["title"]}]({p["link"]})')
          list_md = "\n".join(lines)

          # Update README between markers
          with open("README.md", "r") as f:
              readme = f.read()

          pattern = r"(<!-- BEGIN BLOG-CARDS -->).*?(<!-- END BLOG-CARDS -->)"
          replacement = f"\\1\n{list_md}\n\\2"
          new_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open("README.md", "w") as f:
              f.write(new_readme)

          print(f"Generated {len(posts)} blog post links")
          for p in posts:
              print(f"  - {p['title']}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs(readme): Update blog posts"
          git push
